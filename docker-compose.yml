# Flink CDC 同步 — 服务器部署
#
# 使用前：
#   cp .env.example .env   # 填写源库/目标库
#   ./scripts/up.sh
#
# Web UI：http://<服务器IP>:8089

services:
  jobmanager:
    build: .
    image: nigeria-flink:1.18-cdc
    container_name: nigeria-flink-jobmanager
    restart: unless-stopped
    ports:
      - "${FLINK_WEB_PORT:-8089}:8089"
    command: jobmanager
    environment:
      VT_BASE_URL: ${VT_BASE_URL:-http://101.47.27.225}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        rest.port: 8089
        rest.bind-port: 8089
        jobmanager.memory.process.size: 2048m
        state.backend: rocksdb
        execution.checkpointing.interval: 120s
        execution.checkpointing.mode: EXACTLY_ONCE
        table.local-time-zone: Africa/Lagos
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints
      - flink_savepoints:/tmp/flink-savepoints
      - ./sql:/opt/flink/sql:ro
    networks:
      - flink-network

  taskmanager:
    build: .
    image: nigeria-flink:1.18-cdc
    pull_policy: never
    container_name: nigeria-flink-taskmanager
    restart: unless-stopped
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      VT_BASE_URL: ${VT_BASE_URL:-http://101.47.27.225}
      VT_BATCH_SIZE: ${VT_BATCH_SIZE:-100000}
      VT_BATCH_FLUSH_MS: ${VT_BATCH_FLUSH_MS:-5000}
      VT_BATCH_TIMEOUT_SEC: ${VT_BATCH_TIMEOUT_SEC:-300}
      VT_BATCH_MAX_RETRIES: ${VT_BATCH_MAX_RETRIES:-3}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: ${FLINK_TASK_SLOTS:-16}
        taskmanager.memory.process.size: ${FLINK_TM_MEMORY:-40960m}
        state.backend: rocksdb
        state.backend.rocksdb.memory.managed: true
        table.local-time-zone: Africa/Lagos
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints
      - flink_savepoints:/tmp/flink-savepoints
      - ./sql:/opt/flink/sql:ro
    networks:
      - flink-network

volumes:
  flink_checkpoints:
  flink_savepoints:

networks:
  flink-network:
    driver: bridge

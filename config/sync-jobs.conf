# 多 Job 编排（顺序见文件行序；sync-pipeline-auto.sh 按此顺序执行）
# 格式: JOB_KEY|描述|全量SQL|增量SQL|全量入口脚本(空=run-sql)|源库计数SQL|目标库计数SQL|监控表名|ENABLED
#
# id_mapping 需 Java ProcessFunction，暂不纳入流水线（ENABLED=0）
user|用户主档 mobile|sql/02_sync_user_fast.sql|sql/02_sync_user_incr.sql|run-user-fast.sh|SELECT COUNT(*) FROM user_sync_staging WHERE mobile_norm IS NOT NULL AND TRIM(mobile_norm)<>''|SELECT COUNT(*) FROM `user`|user|1
user_info|用户资料 id_number|sql/02_sync_user_info_fast.sql|sql/02_sync_user_info_incr.sql|run-user-info-fast.sh|SELECT COUNT(*) FROM user_personal_info WHERE bvn IS NOT NULL AND TRIM(bvn)<>''|SELECT COUNT(*) FROM user_info|user_info|1
user_bankcard|银行卡 bank_account|sql/02_sync_user_bankcard_fast.sql|sql/02_sync_user_bankcard_incr.sql|run-user-bankcard-fast.sh|SELECT COUNT(*) FROM user_bank_info WHERE deleted=0|SELECT COUNT(*) FROM user_bankcard|user_bankcard|1
user_product|用户产品额度|sql/02_sync_user_product_fast.sql|sql/02_sync_user_product_incr.sql|run-user-product-fast.sh|SELECT COUNT(*) FROM user_product_sync_staging|SELECT COUNT(*) FROM user_product|user_product|1
application|申请单|sql/02_sync_application_fast.sql|sql/02_sync_application_incr.sql|run-application-fast.sh|SELECT COUNT(*) FROM user_order|SELECT COUNT(*) FROM application|application|1
loan|还款计划|sql/02_sync_loan_fast.sql|sql/02_sync_loan_incr.sql|run-loan-fast.sh|SELECT COUNT(*) FROM user_order_installment|SELECT COUNT(*) FROM loan|loan|1
id_mapping|ID关系双写|sql/02_sync_id_mapping.sql|sql/02_sync_id_mapping_incr.sql||SELECT 0|SELECT COUNT(*) FROM id_mapping|id_mapping|0

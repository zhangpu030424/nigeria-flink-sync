# 多 Job 编排（顺序见文件行序；sync-migrate-auto.sh 按此顺序执行）
# 行格式（| 分隔 9 列；计数 SQL 内勿含 |，loan 用 LIKE OR 勿用 REGEXP 567|568）
#
# 监控计数说明：
# - 源库 SQL：宽表口径（有 VT 的表按 DISTINCT 主键键，与 sync-job-auto VT 阶段一致）
# - 目标库 SQL：带 __USER_ID_OFFSET__ / ng0 前缀 / EXISTS application 切片的只数「本迁移写入」行
# - id_mapping 无迁移切片，仍用 baseline_delta（基线+宽表≈目标总数）
#
# id_mapping 全量由宽表 SQL 展开双向边；增量 CDC 宽表（需定期刷新 staging）
user|用户主档 mobile|sql/02_sync_user_fast.sql|sql/02_sync_user_incr.sql|run-user-fast.sh|SELECT COUNT(*) FROM (SELECT DISTINCT mobile_token,app_code FROM user_sync_staging WHERE mobile_norm IS NOT NULL AND TRIM(mobile_norm)<>'' AND mobile_token IS NOT NULL AND TRIM(mobile_token)<>'') d|SELECT COUNT(*) FROM `user` WHERE user_id > __USER_ID_OFFSET__|user|1
user_info|用户资料 id_number|sql/02_sync_user_info_fast.sql|sql/02_sync_user_info_incr.sql|run-user-info-fast.sh|SELECT COUNT(*) FROM user_info_sync_staging|SELECT COUNT(*) FROM user_info WHERE user_id > __USER_ID_OFFSET__|user_info|1
user_bankcard|银行卡 bank_account|sql/02_sync_user_bankcard_fast.sql|sql/02_sync_user_bankcard_incr.sql|run-user-bankcard-fast.sh|SELECT COUNT(*) FROM (SELECT DISTINCT user_id,bank_account_token FROM user_bankcard_sync_staging WHERE bank_account_token IS NOT NULL AND TRIM(bank_account_token)<>'') d|SELECT COUNT(*) FROM user_bankcard WHERE group_user_id > __USER_ID_OFFSET__|user_bankcard|1
user_product|用户产品额度|sql/02_sync_user_product_fast.sql|sql/02_sync_user_product_incr.sql|run-user-product-fast.sh|SELECT COUNT(*) FROM user_product_sync_staging|SELECT COUNT(*) FROM user_product WHERE group_user_id > __USER_ID_OFFSET__|user_product|1
application|申请单|sql/02_sync_application_fast.sql|sql/02_sync_application_incr.sql|run-application-fast.sh|SELECT COUNT(*) FROM application_sync_staging|SELECT COUNT(*) FROM application WHERE group_user_id > __USER_ID_OFFSET__|application|1
# loan 计数 SQL 勿写 REGEXP '567|568'（| 与 conf 列分隔符冲突）
loan|还款计划|sql/02_sync_loan_fast.sql|sql/02_sync_loan_incr.sql|run-loan-fast.sh|SELECT COUNT(*) FROM loan_sync_staging WHERE (application_no LIKE 'ng0567-%' OR application_no LIKE 'ng0568-%' OR application_no LIKE 'ng0569-%' OR application_no LIKE 'ng0571-%' OR application_no LIKE 'ng0572-%' OR application_no LIKE 'ng0573-%')|SELECT COUNT(*) FROM loan l WHERE (l.application_no LIKE 'ng0567-%' OR l.application_no LIKE 'ng0568-%' OR l.application_no LIKE 'ng0569-%' OR l.application_no LIKE 'ng0571-%' OR l.application_no LIKE 'ng0572-%' OR l.application_no LIKE 'ng0573-%') AND EXISTS (SELECT 1 FROM application a WHERE a.application_no = l.application_no AND a.group_user_id > __USER_ID_OFFSET__)|loan|1
id_mapping|ID关系双写|sql/02_sync_id_mapping.sql|sql/02_sync_id_mapping_incr.sql||SELECT COUNT(*) FROM id_mapping_sync_staging|SELECT COUNT(*) FROM id_mapping|id_mapping|1

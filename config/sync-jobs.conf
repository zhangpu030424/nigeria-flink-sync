# 多 Job 编排（顺序见文件行序；sync-migrate-auto.sh 按此顺序执行）
# 格式: JOB_KEY|描述|全量SQL|增量SQL|全量入口脚本(空=run-sql)|源库计数SQL|目标库计数SQL|监控表名|ENABLED
#
# id_mapping 全量由宽表 SQL 展开双向边；增量 CDC 宽表（需定期刷新 staging）
user|用户主档 mobile|sql/02_sync_user_fast.sql|sql/02_sync_user_incr.sql|run-user-fast.sh|SELECT COUNT(*) FROM (SELECT DISTINCT COALESCE(NULLIF(TRIM(mobile_token),''),mobile_norm),app_code FROM user_sync_staging WHERE mobile_norm IS NOT NULL AND TRIM(mobile_norm)<>'') d|SELECT COUNT(*) FROM `user`|user|1
user_info|用户资料 id_number|sql/02_sync_user_info_fast.sql|sql/02_sync_user_info_incr.sql|run-user-info-fast.sh|SELECT COUNT(*) FROM user_info_sync_staging|SELECT COUNT(*) FROM user_info|user_info|1
user_bankcard|银行卡 bank_account|sql/02_sync_user_bankcard_fast.sql|sql/02_sync_user_bankcard_incr.sql|run-user-bankcard-fast.sh|SELECT COUNT(*) FROM user_bankcard_sync_staging WHERE bank_account_raw IS NOT NULL AND TRIM(bank_account_raw)<>''|SELECT COUNT(*) FROM user_bankcard|user_bankcard|1
user_product|用户产品额度|sql/02_sync_user_product_fast.sql|sql/02_sync_user_product_incr.sql|run-user-product-fast.sh|SELECT COUNT(*) FROM user_product_sync_staging|SELECT COUNT(*) FROM user_product|user_product|1
application|申请单|sql/02_sync_application_fast.sql|sql/02_sync_application_incr.sql|run-application-fast.sh|SELECT COUNT(*) FROM application_sync_staging|SELECT COUNT(*) FROM application|application|1
loan|还款计划|sql/02_sync_loan_fast.sql|sql/02_sync_loan_incr.sql|run-loan-fast.sh|SELECT COUNT(*) FROM loan_sync_staging|SELECT COUNT(*) FROM loan|loan|1
id_mapping|ID关系双写|sql/02_sync_id_mapping.sql|sql/02_sync_id_mapping_incr.sql||SELECT COUNT(*) FROM id_mapping_sync_staging|SELECT COUNT(*) FROM id_mapping|id_mapping|1
